<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nature's Heal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #ffffff;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

.login-card {
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="login-card bg-white p-8 rounded-3xl w-full max-w-md text-center border">
    
    <h1 class="text-3xl font-bold text-emerald-600 mb-2">Nature's Heal</h1>
    <p class="text-gray-500 mb-6">Login to continue</p>

    <!-- Google Login Button -->
    <button onclick="googleLogin()" 
        class="w-full flex items-center justify-center gap-3 border py-3 rounded-xl hover:bg-gray-100 transition font-semibold">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
        Continue with Google
    </button>

    <p class="text-xs text-gray-400 mt-6">
        We only use your basic profile info for checkout.
    </p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "naturesheal.firebaseapp.com",
    projectId: "naturesheal",
    storageBucket: "naturesheal.firebasestorage.app",
    messagingSenderId: "429407436276",
    appId: "1:429407436276:web:2cb0470eecbf9ed349cda1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function() {
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Save to localStorage
        localStorage.setItem('user_name', user.displayName);
        localStorage.setItem('user_email', user.email);
        localStorage.setItem('user_photo', user.photoURL);

        // Redirect logic
        const redirect = localStorage.getItem('redirect_after_login');

        if (redirect === 'checkout') {
            localStorage.removeItem('redirect_after_login');
            window.location.href = 'index.html';
        } else {
            window.location.href = 'index.html';
        }

    } catch (error) {
        alert("Login failed. Try again.");
        console.error(error);
    }
};
</script>

</body>
</html>
