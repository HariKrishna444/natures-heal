```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nature's Heal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border space-y-4">

<h2 class="text-2xl font-bold text-center">Login</h2>

<!-- EMAIL LOGIN -->
<input id="email" type="email" placeholder="Email"
class="w-full p-3 border rounded-xl">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 border rounded-xl">

<button onclick="emailLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl">
Login with Email
</button>

<!-- GOOGLE LOGIN -->
<button onclick="googleLogin()" class="w-full border py-3 rounded-xl">
Login with Google
</button>

<!-- PHONE INPUT WITH +91 PREFIX -->
<div class="flex">
  <span class="px-3 flex items-center bg-gray-100 border rounded-l-xl">+91</span>
  <input id="phone" type="tel" placeholder="9876543210" maxlength="10"
    class="w-full p-3 border border-l-0 rounded-r-xl">
</div>

<div id="recaptcha"></div>

<button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-3 rounded-xl">
Send OTP
</button>

<input id="otp" placeholder="Enter OTP"
class="w-full p-3 border rounded-xl">

<button onclick="verifyOTP()" class="w-full bg-green-600 text-white py-3 rounded-xl">
Verify OTP
</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  setPersistence,
  browserLocalPersistence,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
  authDomain: "naturesheal.firebaseapp.com",
  projectId: "naturesheal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ Persist login
setPersistence(auth, browserLocalPersistence);

// ---------------- EMAIL LOGIN ----------------
window.emailLogin = async function () {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!email || !password) {
    return alert("Enter email & password");
  }

  try {
    const res = await signInWithEmailAndPassword(auth, email, password);
    saveUser(res.user);
  } catch (err) {
    if (
      err.code === "auth/invalid-credential" ||
      err.code === "auth/user-not-found"
    ) {
      try {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        saveUser(res.user);
      } catch (signupErr) {
        alert(signupErr.message);
      }
    } else {
      alert(err.message);
    }
  }
};

// ---------------- GOOGLE LOGIN ----------------
window.googleLogin = async function () {
  const provider = new GoogleAuthProvider();

  try {
    const res = await signInWithPopup(auth, provider);
    saveUser(res.user);
  } catch (err) {
    alert(err.message);
  }
};

// ---------------- OTP LOGIN ----------------
let confirmationResult;

// ✅ Correct reCAPTCHA init
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha', {
  size: 'invisible'
});

window.sendOTP = async function () {
  let phone = document.getElementById('phone').value.trim();

  // Clean input
  phone = phone.replace(/\D/g, "");

  if (phone.length !== 10) {
    return alert("Enter valid 10-digit number");
  }

  phone = "+91" + phone;

  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    alert("OTP sent");
  } catch (err) {
    console.error(err);
    alert(err.message);
  }
};

window.verifyOTP = async function () {
  const code = document.getElementById('otp').value.trim();

  if (!code) return alert("Enter OTP");

  try {
    const res = await confirmationResult.confirm(code);
    saveUser(res.user);
  } catch {
    alert("Invalid OTP");
  }
};

// ---------------- SAVE USER ----------------
function saveUser(user) {
  localStorage.setItem('user_name', user.displayName || "User");
  localStorage.setItem('user_email', user.email || "");
  localStorage.setItem('user_photo', user.photoURL || "");

  const redirect = localStorage.getItem('redirect_after_login');

  if (redirect === 'checkout') {
    localStorage.removeItem('redirect_after_login');
  }

  window.location.href = "index.html";
}

// ---------------- AUTO LOGIN ----------------
onAuthStateChanged(auth, (user) => {
  if (user && !localStorage.getItem('user_name')) {
    saveUser(user);
  }
});
</script>

</body>
</html>
```
