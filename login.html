<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .auth-container { transition: 0.5s; }
        .hidden-auth { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md auth-container">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-emerald-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-200">
                <i class="fas fa-leaf text-white text-xl"></i>
            </div>
            <h2 id="authTitle" class="text-3xl font-black text-slate-800">Welcome Back</h2>
            <p id="authSubtitle" class="text-slate-500">Sign in to complete your order</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-4 text-slate-400"></i>
                    <input type="email" placeholder="Email Address" class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-100 bg-slate-50 focus:border-emerald-500 outline-none transition">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                    <input type="password" placeholder="Password" class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-100 bg-slate-50 focus:border-emerald-500 outline-none transition">
                </div>
                <button onclick="submitAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-emerald-200 hover:bg-emerald-700 transition">LOGIN</button>
            </div>
            <p class="text-center mt-6 text-sm text-slate-500">
                Don't have an account? 
                <button onclick="toggleAuth(true)" class="text-emerald-600 font-bold hover:underline">Sign Up</button>
            </p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden-auth">
            <div class="space-y-4">
                <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-2xl border border-slate-100 bg-slate-50 focus:border-emerald-500 outline-none">
                <input type="email" placeholder="Email Address" class="w-full px-4 py-3 rounded-2xl border border-slate-100 bg-slate-50 focus:border-emerald-500 outline-none">
                <input type="password" placeholder="Create Password" class="w-full px-4 py-3 rounded-2xl border border-slate-100 bg-slate-50 focus:border-emerald-500 outline-none">
                <button onclick="submitAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-xl">CREATE ACCOUNT</button>
            </div>
            <p class="text-center mt-6 text-sm text-slate-500">
                Already have an account? 
                <button onclick="toggleAuth(false)" class="text-emerald-600 font-bold hover:underline">Login</button>
            </p>
        </div>

        <button onclick="window.history.back()" class="w-full mt-4 text-slate-400 text-sm font-bold flex items-center justify-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to Catalog
        </button>
    </div>

    <script>
        function toggleAuth(isSignup) {
            const login = document.getElementById('loginForm');
            const signup = document.getElementById('signupForm');
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');

            if(isSignup) {
                login.classList.add('hidden-auth');
                signup.classList.remove('hidden-auth');
                title.innerText = "Create Account";
                subtitle.innerText = "Join Nature's Heal today";
            } else {
                login.classList.remove('hidden-auth');
                signup.classList.add('hidden-auth');
                title.innerText = "Welcome Back";
                subtitle.innerText = "Sign in to complete your order";
            }
        }

        function submitAuth() {
            // In a real app, you would handle Firebase or Backend logic here
            alert("Success! Transferring to shipping details...");
            window.location.href = "index.html?auth=true"; // Return to main with auth state
        }
    </script>
</body>
</html>
