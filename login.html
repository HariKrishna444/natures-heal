<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-emerald-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-leaf text-white text-xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800">Welcome Back</h2>
            <p class="text-slate-500">Sign in to continue</p>
        </div>

        <!-- Login Form -->
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-4 text-slate-400"></i>
                <input id="email" type="email" placeholder="Email Address"
                    class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-200 bg-slate-50 focus:border-emerald-500 outline-none"
                    onkeypress="handleEnter(event)">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                <input id="password" type="password" placeholder="Password"
                    class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-200 bg-slate-50 focus:border-emerald-500 outline-none"
                    onkeypress="handleEnter(event)">
            </div>

            <button id="loginBtn" onclick="login()" 
                class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition">
                LOGIN
            </button>
        </div>

        <!-- Back -->
        <button onclick="goBack()" 
            class="w-full mt-6 text-slate-400 text-sm font-bold flex items-center justify-center gap-2 hover:text-emerald-600">
            <i class="fas fa-arrow-left"></i> Back to Catalog
        </button>
    </div>

    <script>
        function handleEnter(e) {
            if (e.key === "Enter") login();
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            // Basic validation
            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            if (!email.includes("@")) {
                alert("Enter a valid email");
                return;
            }

            // Disable button while processing
            btn.disabled = true;
            btn.innerText = "Logging in...";

            setTimeout(() => {
                const name = email.split('@')[0];

                localStorage.setItem('user_name', name);
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_photo', 'https://i.pravatar.cc/150?u=' + email);

                // Redirect logic
                const redirect = localStorage.getItem('redirect_after_login');

                localStorage.removeItem('redirect_after_login');

                window.location.href = "index.html";

            }, 800); // simulate login delay
        }

        function goBack() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
