<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nature's Heal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>

<style>
body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border space-y-4">

<h2 class="text-2xl font-bold text-center">Login</h2>

<!-- Email -->
<input id="email" type="email" placeholder="Email"
class="w-full p-3 border rounded-xl">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 border rounded-xl">

<button onclick="emailLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl">
Login with Email
</button>

<!-- Google -->
<button onclick="googleLogin()" class="w-full border py-3 rounded-xl">
Login with Google
</button>

<!-- OTP -->
<input id="phone" type="tel" placeholder="+91XXXXXXXXXX"
class="w-full p-3 border rounded-xl">

<div id="recaptcha"></div>

<button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-3 rounded-xl">
Send OTP
</button>

<input id="otp" placeholder="Enter OTP"
class="w-full p-3 border rounded-xl">

<button onclick="verifyOTP()" class="w-full bg-green-600 text-white py-3 rounded-xl">
Verify OTP
</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  setPersistence,
  browserLocalPersistence,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
  authDomain: "naturesheal.firebaseapp.com",
  projectId: "naturesheal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ persistence
setPersistence(auth, browserLocalPersistence);

// ---------------- EMAIL LOGIN ----------------
window.emailLogin = async function () {
  const emailInput = document.getElementById('email').value;
  const passwordInput = document.getElementById('password').value;

  if (!emailInput || !passwordInput) {
    alert("Enter email & password");
    return;
  }

  try {
    const res = await signInWithEmailAndPassword(auth, emailInput, passwordInput);
    saveUser(res.user);
  } catch (err) {
    // auto signup if user not found
    if (err.code === "auth/user-not-found") {
      const res = await createUserWithEmailAndPassword(auth, emailInput, passwordInput);
      saveUser(res.user);
    } else {
      alert(err.message);
    }
  }
};

// ---------------- GOOGLE LOGIN ----------------
window.googleLogin = async function () {
  const provider = new GoogleAuthProvider();

  try {
    const res = await signInWithPopup(auth, provider);
    saveUser(res.user);
  } catch (err) {
    alert(err.message);
  }
};

// ---------------- OTP LOGIN ----------------
let confirmationResult;

window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha', {
  size: 'invisible'
});

window.sendOTP = async function () {
  const phone = document.getElementById('phone').value;

  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    alert("OTP sent");
  } catch (err) {
    alert(err.message);
  }
};

window.verifyOTP = async function () {
  const code = document.getElementById('otp').value;

  try {
    const res = await confirmationResult.confirm(code);
    saveUser(res.user);
  } catch {
    alert("Invalid OTP");
  }
};

// ---------------- SAVE USER ----------------
function saveUser(user) {
  localStorage.setItem('user_name', user.displayName || "User");
  localStorage.setItem('user_email', user.email || "");
  localStorage.setItem('user_photo', user.photoURL || "");

  window.location.href = "index.html";
}

// ---------------- AUTO LOGIN ----------------
onAuthStateChanged(auth, (user) => {
  if (user && !localStorage.getItem('user_name')) {
    saveUser(user);
  }
});
</script>

</body>
</html>
