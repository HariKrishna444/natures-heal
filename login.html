<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nature's Heal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js"></script>

<style>
body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border space-y-4">

<h2 class="text-2xl font-bold text-center">Login</h2>

<!-- Email -->
<input id="email" type="email" placeholder="Email"
class="w-full p-3 border rounded-xl">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 border rounded-xl">

<button onclick="emailLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl">
Login with Email
</button>

<!-- Google -->
<button onclick="googleLogin()" class="w-full border py-3 rounded-xl">
Login with Google
</button>

<!-- OTP -->
<input id="phone" type="tel" placeholder="+91XXXXXXXXXX"
class="w-full p-3 border rounded-xl">

<div id="recaptcha"></div>

<button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-3 rounded-xl">
Send OTP
</button>

<input id="otp" placeholder="Enter OTP"
class="w-full p-3 border rounded-xl">

<button onclick="verifyOTP()" class="w-full bg-green-600 text-white py-3 rounded-xl">
Verify OTP
</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "naturesheal.firebaseapp.com",
  projectId: "naturesheal"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Auto persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ------------------ EMAIL LOGIN ------------------
function emailLogin() {
  const email = email.value;
  const password = password.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(res => saveUser(res.user))
    .catch(err => alert(err.message));
}

// ------------------ GOOGLE LOGIN ------------------
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res => saveUser(res.user))
    .catch(err => alert(err.message));
}

// ------------------ OTP LOGIN ------------------
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'invisible'
});

function sendOTP() {
  const phone = document.getElementById('phone').value;

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(result => {
      window.confirmationResult = result;
      alert("OTP sent");
    })
    .catch(err => alert(err.message));
}

function verifyOTP() {
  const code = document.getElementById('otp').value;

  confirmationResult.confirm(code)
    .then(res => saveUser(res.user))
    .catch(err => alert("Invalid OTP"));
}

// ------------------ SAVE USER ------------------
function saveUser(user) {
  localStorage.setItem('user_name', user.displayName || "User");
  localStorage.setItem('user_email', user.email || "");
  localStorage.setItem('user_photo', user.photoURL || "");

  redirectUser();
}

// ------------------ REDIRECT ------------------
function redirectUser() {
  const redirect = localStorage.getItem('redirect_after_login');
  localStorage.removeItem('redirect_after_login');

  window.location.href = "index.html";
}

// ------------------ AUTO LOGIN ------------------
auth.onAuthStateChanged(user => {
  if (user) {
    saveUser(user);
  }
});
</script>

</body>
</html>
