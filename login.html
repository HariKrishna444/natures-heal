<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Nature's Heal</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #064e3b, #10b981);
}
.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
}
.fade-in {
    animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl fade-in text-white">

    <!-- Logo -->
    <div class="text-center mb-6">
        <i class="fas fa-leaf text-4xl mb-2"></i>
        <h1 class="text-2xl font-bold">Nature's Heal</h1>
        <p class="text-sm opacity-80">Login to continue</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">
        <input id="name" type="text" placeholder="Full Name"
            class="w-full p-3 rounded-xl bg-white/20 placeholder-white/70 outline-none focus:ring-2 focus:ring-white">

        <input id="email" type="email" placeholder="Email Address"
            class="w-full p-3 rounded-xl bg-white/20 placeholder-white/70 outline-none focus:ring-2 focus:ring-white">

        <input id="photo" type="text" placeholder="Profile Image URL (optional)"
            class="w-full p-3 rounded-xl bg-white/20 placeholder-white/70 outline-none focus:ring-2 focus:ring-white">

        <button onclick="login()"
            class="w-full bg-white text-emerald-700 py-3 rounded-xl font-bold hover:bg-emerald-50 transition">
            Login
        </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center my-6">
        <div class="flex-grow h-px bg-white/30"></div>
        <span class="px-3 text-sm">OR</span>
        <div class="flex-grow h-px bg-white/30"></div>
    </div>

    <!-- Google Login (Mock) -->
    <button onclick="googleLogin()"
        class="w-full flex items-center justify-center gap-2 bg-white text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-100 transition">
        <i class="fab fa-google"></i> Continue with Google
    </button>

    <!-- Back -->
    <p class="text-center mt-6 text-sm">
        <a href="index.html" class="underline">← Back to Home</a>
    </p>
</div>

<script>
function login() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const photo = document.getElementById('photo').value.trim() || "https://i.pravatar.cc/150";

    if (!name || !email) {
        alert("Please fill all details");
        return;
    }

    // Save to localStorage
    localStorage.setItem('user_name', name);
    localStorage.setItem('user_email', email);
    localStorage.setItem('user_photo', photo);

    redirectUser();
}

// Mock Google login
function googleLogin() {
    const fakeName = "Google User";
    const fakeEmail = "user@gmail.com";
    const fakePhoto = "https://i.pravatar.cc/150?img=12";

    localStorage.setItem('user_name', fakeName);
    localStorage.setItem('user_email', fakeEmail);
    localStorage.setItem('user_photo', fakePhoto);

    redirectUser();
}

// Redirect after login
function redirectUser() {
    const redirect = localStorage.getItem('redirect_after_login');

    if (redirect === 'checkout') {
        localStorage.removeItem('redirect_after_login');
        window.location.href = 'index.html';
    } else {
        window.location.href = 'index.html';
    }
}
</script>

</body>
</html>
