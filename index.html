<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --header-bg: #059669; 
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --footer-bg: #0f172a;
            --hero-bg: #064e3b;
            --cart-bg: #ffffff;
        }

        .dark {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --header-bg: #064e3b; 
            --border-color: #1e293b;
            --input-bg: #1e293b;
            --cart-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        #cartSidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color);
        }

        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }

        #themeToggle {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px;
            border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .modal-animate { animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
    authDomain: "naturesheal.firebaseapp.com",
    projectId: "naturesheal",
    storageBucket: "naturesheal.firebasestorage.app",
    messagingSenderId: "429407436276",
    appId: "1:429407436276:web:2cb0470eecbf9ed349cda1",
    measurementId: "G-Y6FTZY92QP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.placeOrder = async function() {
    if (cart.length === 0) { alert("Your cart is empty!"); return; }
    const btn = document.getElementById('placeOrderBtn');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;

    const items = catalogData.filter(i => cart.includes(i.id));
    const total = items.reduce((sum, item) => sum + item.price, 0);

    try {
        await addDoc(collection(db, "orders"), {
            order_items: items,
            total_price: total,
            status: "pending",
            created_at: serverTimestamp()
        });
        alert('Order Placed Successfully! Total: ₹' + total.toFixed(2));
        cart = []; 
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartBadge();
        renderCartItems();
        closeCart();
        applyCombinedFilters();
    } catch (error) {
        alert('Failed to place order.');
        console.error('Firestore Error:', error);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
  }
</script>

    <button id="themeToggle" onclick="toggleTheme()" title="Toggle Night Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="closeCart()"></div>
    
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <button onclick="closeCart()" class="text-slate-500 hover:text-rose-500 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
            <div class="mt-6 pt-6 border-t">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="font-bold">Total Amount:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all flex justify-center items-center gap-2">
                    <span>Place Order</span>
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-2xl font-bold text-white">Nature's Heal</span>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold">
                <button data-filter="all" onclick="filterItems('all')" class="filter-btn text-white border-b-2 border-white pb-1">All Catalog</button>
                <button data-filter="leaf" onclick="filterItems('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button data-filter="fruit" onclick="filterItems('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button data-filter="wild_fruit" onclick="filterItems('wild_fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Wild Fruits</button>
                <button data-filter="seed" onclick="filterItems('seed')" class="filter-btn text-emerald-100 hover:text-white pb-1">Seeds</button>
                <button data-filter="favorites" onclick="filterItems('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">Collection ⭐</button>
            </nav>
            <div class="relative flex items-center gap-3">
                <button onclick="toggleCartSidebar()" class="relative p-2 text-white">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <input type="text" id="searchInput" placeholder="Search plants..." class="bg-emerald-700 text-white placeholder-emerald-200 rounded-full py-2 px-4 pl-10 w-full md:w-64">
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-4 py-12">
        <div class="mb-8">
            <h2 class="text-3xl font-bold mb-1 dark:text-white">Botanical Catalog</h2>
            <p class="text-slate-500 font-medium">Showing <span id="itemCount" class="font-bold text-emerald-600">0</span> unique species</p>
        </div>
        <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8">
            <div class="col-span-full text-center py-20"><i class="fas fa-spinner fa-spin text-4xl text-emerald-600"></i></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-emerald-950 rounded-[2rem] max-w-2xl w-full overflow-hidden shadow-2xl modal-animate border border-emerald-800"></div>
    </div>

    <script>
        // UPDATED: Using your specific Published CSV link
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;

        let catalogData = [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                
                // Parse headers from the first row
                const headers = rows[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
                
                catalogData = rows.slice(1).map(row => {
                    // Regex handles commas inside quotes correctly
                    const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                    let obj = {};
                    headers.forEach((header, i) => {
                        let val = values[i];
                        if (header === 'id' || header === 'price') obj[header] = parseFloat(val) || 0;
                        else obj[header] = val || "";
                    });
                    return obj;
                }).filter(item => item.id);

                renderItems(catalogData);
                updateCartBadge();
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('gridContainer').innerHTML = `
                    <div class="col-span-full text-center p-10 bg-rose-50 rounded-3xl border border-rose-200">
                        <i class="fas fa-exclamation-triangle text-3xl text-rose-500 mb-4"></i>
                        <p class="text-rose-600 font-bold">Database Connection Failed</p>
                        <p class="text-sm text-rose-500 mt-2">Check console for errors. Ensure you are running on a Live Server.</p>
                    </div>`;
            }
        }

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            document.getElementById('itemCount').textContent = items.length;
            
            items.forEach(item => {
                const isFav = favorites.includes(item.id);
                const isCart = cart.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer group relative";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="h-36 md:h-56 overflow-hidden relative">
                        <img src="${item.image}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 flex flex-col gap-1">
                            <button onclick="toggleFav(event, ${item.id})" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/90">
                                <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart"></i>
                            </button>
                            <button onclick="toggleCartItem(event, ${item.id})" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/90">
                                <i class="fas ${isCart ? 'fa-shopping-cart text-emerald-600' : 'fa-cart-plus text-slate-400'}"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-emerald-700 dark:text-emerald-400">${item.name}</h3>
                            <span class="font-black text-emerald-600">₹${item.price.toFixed(2)}</span>
                        </div>
                        <p class="text-xs italic text-emerald-600 mb-2">${item.scientific}</p>
                        <p class="text-xs text-slate-500 line-clamp-2">${item.description}</p>
                    </div>`;
                container.appendChild(card);
            });
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
                <div class="relative">
                    <img src="${item.image}" class="w-full h-64 object-cover">
                    <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full"><i class="fas fa-times"></i></button>
                    <div class="p-8">
                        <h2 class="text-2xl font-bold text-emerald-400 mb-2">${item.name} <span class="text-white ml-4">₹${item.price}</span></h2>
                        <p class="text-emerald-300 italic mb-4">${item.scientific}</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div><h4 class="text-xs font-bold text-emerald-500 uppercase">Description</h4><p class="text-sm text-white">${item.description}</p></div>
                            <div><h4 class="text-xs font-bold text-emerald-500 uppercase">Uses</h4><p class="text-sm text-white">${item.uses}</p></div>
                        </div>
                        <button onclick="addToCart(${item.id})" class="w-full bg-emerald-500 text-white py-3 rounded-xl mt-6 font-bold">Add to Cart</button>
                    </div>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function toggleFav(e, id) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(i => i !== id) : [...favorites, id]; localStorage.setItem('favorites', JSON.stringify(favorites)); applyCombinedFilters(); }
        function toggleCartItem(e, id) { if(e) e.stopPropagation(); cart = cart.includes(id) ? cart.filter(i => i !== id) : [...cart, id]; localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); renderCartItems(); applyCombinedFilters(); }
        function addToCart(id) { if(!cart.includes(id)) { cart.push(id); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); } closeModal(); toggleCartSidebar(); }
        function toggleCartSidebar() { renderCartItems(); document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; }
        function closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function updateCartBadge() { const b = document.getElementById('cartBadge'); b.textContent = cart.length; b.classList.toggle('hidden', !cart.length); }
        function toggleTheme() { document.body.classList.toggle('dark'); const isDark = document.body.classList.contains('dark'); document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon'; }

        function renderCartItems() {
            const list = document.getElementById('cartItemsList');
            const items = catalogData.filter(i => cart.includes(i.id));
            const total = items.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;
            list.innerHTML = items.map(i => `<div class="flex items-center gap-4 p-2 bg-slate-50 dark:bg-slate-900 rounded-xl"><img src="${i.image}" class="w-12 h-12 rounded object-cover"><div class="flex-grow"><h4 class="font-bold text-sm">${i.name}</h4><p class="text-xs">₹${i.price}</p></div><button onclick="toggleCartItem(null, ${i.id})" class="text-rose-500"><i class="fas fa-trash"></i></button></div>`).join('') || '<p class="text-center py-10">Cart is empty</p>';
        }

        function applyCombinedFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = localStorage.getItem('selectedFilter') || 'all';
            const filtered = catalogData.filter(item => {
                const matchesType = type === 'all' || item.type === type || (type === 'favorites' && favorites.includes(item.id));
                const matchesSearch = (item.name || "").toLowerCase().includes(term) || (item.scientific || "").toLowerCase().includes(term);
                return matchesType && matchesSearch;
            });
            renderItems(filtered);
        }

        function filterItems(type) { localStorage.setItem('selectedFilter', type); document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('border-white', btn.dataset.filter === type)); applyCombinedFilters(); }
        document.getElementById('searchInput').oninput = applyCombinedFilters;
        window.onload = fetchSheetData;
    </script>
</body>
</html>
