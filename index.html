<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #475569;
            --header-bg: #059669; --border-color: #e2e8f0; --input-bg: #ffffff; --footer-bg: #0f172a;
            --hero-bg: #064e3b; --cart-bg: #ffffff;
        }
        .dark {
            --bg-body: #020617; --bg-card: #0f172a; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --header-bg: #064e3b; --border-color: #1e293b; --input-bg: #1e293b; --cart-bg: #0f172a;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.3s ease, color 0.3s ease; overflow-x: hidden; }
        .hero-banner { background-color: var(--hero-bg); border-radius: 2rem; position: relative; overflow: hidden; }
        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        #cartSidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color); }
        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }
        footer { background-color: var(--footer-bg); }
        #themeToggle { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px; border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #10b981; color: white; padding: 1rem 2rem; border-radius: 1rem;
            font-weight: 600; box-shadow: 0 10px 15px rgba(0,0,0,0.2); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="toast">Order Placed Successfully!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
            authDomain: "naturesheal.firebaseapp.com",
            projectId: "naturesheal",
            storageBucket: "naturesheal.firebasestorage.app",
            messagingSenderId: "429407436276",
            appId: "1:429407436276:web:2cb0470eecbf9ed349cda1",
            measurementId: "G-Y6FTZY92QP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.placeOrder = async function() {
            const btn = document.getElementById('placeOrderBtn');
            if (btn.disabled || window.appState.cart.length === 0) return;

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;

            const items = window.appState.catalogData.filter(i => window.appState.cart.includes(i.id));
            const total = items.reduce((sum, item) => sum + (item.price || 0), 0);

            try {
                await addDoc(collection(db, "orders"), {
                    order_items: items,
                    total_price: total,
                    status: "pending",
                    created_at: serverTimestamp()
                });
                
                showToast(`Order Placed! Total: ₹${total.toFixed(2)}`);
                window.appState.cart = []; 
                localStorage.setItem('cart', JSON.stringify(window.appState.cart));
                updateCartBadge();
                renderCartItems();
                closeCart();
                applyCombinedFilters();
            } catch (error) {
                showToast('Failed to place order.', true);
                console.error('Firestore Error:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Place Order</span>`;
            }
        }
    </script>

    <button id="themeToggle" onclick="toggleTheme()" title="Toggle Night Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="closeCart()"></div>
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-8 border-b border-emerald-200 dark:border-emerald-800 pb-4">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <button onclick="closeCart()" class="text-slate-500 dark:text-slate-400 hover:text-rose-500 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
            <div class="mt-6 pt-6 border-t border-emerald-200 dark:border-emerald-800">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="font-bold text-slate-600 dark:text-slate-300">Total:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600 dark:text-emerald-400">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all">Place Order</button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-2xl font-bold tracking-tight text-white">Nature's Heal</span>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold">
                <button data-filter="all" onclick="filterItems('all')" class="filter-btn text-white border-b-2 border-white pb-1">All Catalog</button>
                <button data-filter="leaf" onclick="filterItems('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button data-filter="fruit" onclick="filterItems('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button data-filter="seed" onclick="filterItems('seed')" class="filter-btn text-emerald-100 hover:text-white pb-1">Seeds</button>
                <button data-filter="favorites" onclick="filterItems('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">⭐ Collection</button>
            </nav>
            <div class="relative flex items-center gap-3">
                <button onclick="toggleCartSidebar()" class="relative p-2 text-white">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <input type="text" id="searchInput" placeholder="Search plants..." class="bg-emerald-700 text-white border-none rounded-full py-2 px-4 pl-10 focus:ring-2 focus:ring-white w-full md:w-64 transition-all">
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <h2 class="text-3xl font-bold mb-1 dark:text-white">Botanical Catalog</h2>
            <p class="text-emerald-600 font-medium">Showing <span id="itemCount">0</span> species</p>
        </div>
        <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-white dark:bg-slate-900 rounded-[2rem] max-w-2xl w-full overflow-hidden shadow-2xl border border-emerald-800"></div>
    </div>

    <script>
        // Use the /pub?output=csv format[cite: 2]
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;
        
        window.appState = {
            catalogData: [],
            favorites: JSON.parse(localStorage.getItem('favorites')) || [],
            cart: JSON.parse(localStorage.getItem('cart')) || []
        };

        // ENHANCED FETCH FUNCTION[cite: 2, 3]
        window.fetchSheetData = async function(isBackground = false) {
            try {
                if (!isBackground) {
                    document.getElementById('gridContainer').innerHTML = 
                        `<div class="col-span-full text-center py-20"><i class="fas fa-spinner fa-spin text-3xl text-emerald-500"></i><p class="mt-4">Loading catalog...</p></div>`;
                }

                // Cache-busting URL with explicit CORS settings[cite: 2, 3]
                const finalUrl = `${SHEET_URL}&cb=${new Date().getTime()}`;
                const response = await fetch(finalUrl, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-store'
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);[cite: 2]
                
                const data = await response.text();
                if (!data || data.length < 10) throw new Error("Received empty or invalid data from Google Sheets.");

                const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());

                const newData = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let obj = {};
                    headers.forEach((h, i) => {
                        let val = cols[i]?.replace(/^"|"$/g, "").trim();
                        if (h === "id" || h === "price") obj[h] = parseFloat(val) || 0;
                        else obj[h] = val || "";
                    });
                    return obj;
                }).filter(i => i.id);

                window.appState.catalogData = newData;
                applyCombinedFilters();
                if(document.getElementById('cartSidebar').classList.contains('active')) renderCartItems();

            } catch (e) { 
                console.error("Critical Fetch Error:", e);
                if (!isBackground) {
                    showToast("Error: " + e.message, true);[cite: 3]
                    document.getElementById('gridContainer').innerHTML = 
                        `<div class="col-span-full text-center py-20 text-rose-500">
                            <i class="fas fa-exclamation-triangle text-3xl mb-4"></i>
                            <p class="font-bold">Failed to load catalog.</p>
                            <p class="text-sm opacity-70">${e.message}</p>
                            <button onclick="fetchSheetData()" class="mt-4 bg-emerald-600 text-white px-6 py-2 rounded-full">Retry</button>
                        </div>`;
                }
            }
        };

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#ef4444' : '#10b981';
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 4000);
        }

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            document.getElementById('itemCount').textContent = items.length;
            items.forEach(item => {
                const isFav = window.appState.favorites.includes(item.id);
                const isInCart = window.appState.cart.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer group p-2";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="h-40 overflow-hidden relative rounded-2xl">
                        <img src="${item.image}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 flex flex-col gap-2">
                            <button onclick="toggleFav(event, ${item.id})" class="w-8 h-8 rounded-full bg-white/90 flex items-center justify-center">
                                <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-3">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-emerald-700 dark:text-emerald-400">${item.name}</h3>
                            <span class="font-bold text-emerald-600">₹${(item.price || 0).toFixed(2)}</span>
                        </div>
                        <p class="text-[10px] italic text-slate-500 mb-2">${item.scientific}</p>
                        <button onclick="toggleCartItem(event, ${item.id})" class="w-full mt-2 py-2 rounded-xl text-xs font-bold transition-all ${isInCart ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-700'}">
                            ${isInCart ? 'Remove' : 'Add to Cart'}
                        </button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleFav(e, id) {
            e.stopPropagation();
            window.appState.favorites = window.appState.favorites.includes(id) ? window.appState.favorites.filter(i => i !== id) : [...window.appState.favorites, id];
            localStorage.setItem('favorites', JSON.stringify(window.appState.favorites));
            applyCombinedFilters();
        }

        function toggleCartItem(e, id) {
            if(e) e.stopPropagation();
            window.appState.cart = window.appState.cart.includes(id) ? window.appState.cart.filter(i => i !== id) : [...window.appState.cart, id];
            localStorage.setItem('cart', JSON.stringify(window.appState.cart));
            updateCartBadge();
            applyCombinedFilters();
            if(document.getElementById('cartSidebar').classList.contains('active')) renderCartItems();
        }

        function updateCartBadge() {
            const b = document.getElementById('cartBadge');
            b.textContent = window.appState.cart.length; b.classList.toggle('hidden', !window.appState.cart.length);
        }

        function applyCombinedFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = localStorage.getItem('selectedFilter') || 'all';
            const filtered = window.appState.catalogData.filter(item => {
                const matchesType = type === 'all' || item.type === type || (type === 'favorites' && window.appState.favorites.includes(item.id));
                const matchesSearch = item.name.toLowerCase().includes(term) || item.scientific.toLowerCase().includes(term);
                return matchesType && matchesSearch;
            });
            renderItems(filtered);
        }

        function filterItems(type) {
            localStorage.setItem('selectedFilter', type);
            applyCombinedFilters();
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
                <div class="p-8">
                    <img src="${item.image}" class="w-full h-64 object-cover rounded-2xl mb-6">
                    <h2 class="text-2xl font-bold text-emerald-700 mb-2">${item.name}</h2>
                    <p class="text-slate-600 mb-4">${item.description}</p>
                    <button onclick="closeModal()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Close</button>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleCartSidebar() { renderCartItems(); document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; }
        function closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; }
        
        function renderCartItems() {
            const list = document.getElementById('cartItemsList');
            const items = window.appState.catalogData.filter(i => window.appState.cart.includes(i.id));
            const total = items.reduce((sum, item) => sum + (item.price || 0), 0);
            document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;
            list.innerHTML = items.length ? items.map(i => `
                <div class="flex items-center gap-4 p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                    <img src="${i.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow"><h4 class="font-bold text-sm text-emerald-700">${i.name}</h4></div>
                    <button onclick="toggleCartItem(null, ${i.id})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                </div>`).join('') : '<p class="text-center text-slate-400 py-10">Cart is empty</p>';
        }

        window.onload = () => {
            fetchSheetData();
            setInterval(() => fetchSheetData(true), 30000);[cite: 3]
        };
    </script>
</body>
</html>
