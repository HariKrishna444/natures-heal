<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #475569;
            --header-bg: #059669; --border-color: #e2e8f0; --input-bg: #ffffff; --footer-bg: #0f172a;
            --hero-bg: #064e3b; --cart-bg: #ffffff;
        }
        .dark {
            --bg-body: #020617; --bg-card: #0f172a; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --header-bg: #064e3b; --border-color: #1e293b; --input-bg: #1e293b; --cart-bg: #0f172a;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: 0.3s; overflow-x: hidden; }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #cartSidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--cart-bg); z-index: 100; transition: right 0.4s; box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color); }
        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #10b981; color: white; padding: 1rem 2rem; border-radius: 1rem; font-weight: 600; transition: 0.3s; z-index: 1000; }
        #toast.active { transform: translateX(-50%) translateY(0); }
        .skeleton { @apply animate-pulse bg-emerald-100 dark:bg-emerald-900/20 rounded-3xl; }
    </style>
</head>
<body>
    <div id="toast">Action Successful!</div>

    <button id="themeToggle" onclick="app.toggleTheme()" class="fixed bottom-8 right-8 w-12 h-12 rounded-full bg-emerald-500 text-white z-50 shadow-lg flex items-center justify-center">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="app.closeCart()"></div>
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-8 border-b pb-4 border-emerald-100 dark:border-emerald-800">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <div class="flex gap-4 items-center">
                    <button onclick="app.clearCart()" class="text-xs font-bold text-rose-500 hover:underline">Clear All</button>
                    <button onclick="app.closeCart()" class="text-slate-500 hover:text-rose-500"><i class="fas fa-times text-xl"></i></button>
                </div>
            </div>
            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
            <div class="mt-6 pt-6 border-t border-emerald-100 dark:border-emerald-800">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="font-bold">Total Amount:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all">Place Order</button>
            </div>
        </div>
    </div>

    <!-- RESTORED HEADER STRUCTURE[cite: 1] -->
    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-2xl font-bold tracking-tight text-white">Nature's Heal</span>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold">
                <button onclick="app.filterItems('all')" class="filter-btn text-white border-b-2 border-white pb-1">All Catalog</button>
                <button onclick="app.filterItems('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button onclick="app.filterItems('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button onclick="app.filterItems('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">Collection ⭐</button>
            </nav>
            <div class="relative flex items-center gap-3">
                <button onclick="app.toggleCartSidebar()" class="relative p-2 text-white hover:text-emerald-200">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <div class="relative">
                    <input type="text" id="searchInput" oninput="app.handleSearch()" placeholder="Search plants..." class="bg-emerald-700 text-white placeholder-emerald-200 border-none rounded-full py-2 px-4 pl-10 focus:ring-2 focus:ring-white w-full md:w-64 transition-all">
                    <i class="fas fa-search absolute left-3 top-3 text-emerald-200"></i>
                </div>
            </div>
            <div class="w-full md:hidden mt-2">
                <select id="mobileFilter" onchange="app.filterItems(this.value)" class="w-full bg-emerald-800 text-white border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-white transition-all outline-none font-semibold">
                    <option value="all">🌿 All Catalog</option>
                    <option value="leaf">🍃 Leaves</option>
                    <option value="fruit">🍎 Fruits</option>
                    <option value="wild_fruit">🫐 Wild Fruits</option>
                    <option value="seed">🌰 Seeds</option>
                    <option value="favorites">⭐ Collection</option>
                </select>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-4 py-12">
        <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-emerald-950 rounded-[2rem] max-w-2xl w-full overflow-hidden shadow-2xl border border-emerald-800"></div>
    </div>

    <!-- Firebase Scripts[cite: 1] -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
            authDomain: "naturesheal.firebaseapp.com",
            projectId: "naturesheal",
            storageBucket: "naturesheal.firebasestorage.app",
            messagingSenderId: "429407436276",
            appId: "1:429407436276:web:2cb0470eecbf9ed349cda1",
            measurementId: "G-Y6FTZY92QP"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.placeOrder = async function() {
            const btn = document.getElementById('placeOrderBtn');
            if (app.state.cart.length === 0) return;

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

            try {
                const orderData = app.state.cart.map(c => {
                    const item = app.state.catalogData.find(i => i.id === c.id);
                    return { ...item, qty: c.qty };
                });

                await addDoc(collection(db, "orders"), {
                    order_items: orderData,
                    created_at: serverTimestamp(),
                    status: "pending"
                });
                
                app.showToast("Order Placed Successfully!");
                app.clearCart(false);
                app.closeCart();
            } catch (error) {
                app.showToast('Failed to place order.', true);
            } finally {
                btn.disabled = false;
                btn.innerText = "Place Order";
            }
        }
    </script>

    <script>
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;
        
        const app = {
            state: {
                catalogData: [],
                filteredCache: [],
                favorites: JSON.parse(localStorage.getItem('favorites')) || [],
                cart: JSON.parse(localStorage.getItem('cart')) || [],
                activeFilter: 'all',
                isCartOpen: false
            },

            init() {
                this.renderSkeletons();
                this.fetchSheetData();
                this.updateCartBadge();
            },

            renderSkeletons() {
                const container = document.getElementById('gridContainer');
                container.innerHTML = Array(8).fill(0).map(() => `
                    <div class="h-64 skeleton animate-pulse bg-emerald-100 dark:bg-emerald-900/20 rounded-3xl"></div>
                `).join('');
            },

            async fetchSheetData() {
                try {
                    const response = await fetch(SHEET_URL);
                    const data = await response.text();
                    const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
                    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());

                    this.state.catalogData = rows.slice(1).map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        let obj = {};
                        headers.forEach((h, i) => {
                            let val = cols[i]?.replace(/^"|"$/g, "").trim();
                            if (h === "id" || h === "price") obj[h] = parseFloat(val) || 0;
                            else obj[h] = val || "";
                        });
                        return obj;
                    }).filter(i => i.id);

                    this.applyCombinedFilters();
                } catch (e) { 
                    this.showToast("Connection Error", true);
                }
            },

            handleSearch() {
                clearTimeout(this.debounce);
                this.debounce = setTimeout(() => this.applyCombinedFilters(), 300);
            },

            applyCombinedFilters() {
                const term = document.getElementById('searchInput').value.toLowerCase();
                const type = this.state.activeFilter;

                this.state.filteredCache = this.state.catalogData.filter(item => {
                    const matchSearch = (text) => text?.toLowerCase().includes(term);
                    const matchesType = type === 'all' || item.type === type || 
                                       (type === 'favorites' && this.state.favorites.includes(item.id));
                    
                    return matchesType && (matchSearch(item.name) || matchSearch(item.scientific));
                });

                this.renderItems(this.state.filteredCache);
            },

            renderItems(items) {
                const container = document.getElementById('gridContainer');
                container.innerHTML = items.map(item => {
                    const isFav = this.state.favorites.includes(item.id);
                    return `
                        <div class="nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer bg-white dark:bg-slate-900 border dark:border-slate-800" onclick="app.openModal(${item.id})">
                            <div class="h-40 overflow-hidden relative">
                                <img src="${item.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'">
                                <button onclick="app.toggleFav(event, ${item.id})" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center">
                                    <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart"></i>
                                </button>
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-emerald-700 dark:text-emerald-400 text-sm md:text-base">${item.name}</h3>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-xs md:text-sm font-black text-emerald-600">₹${item.price.toFixed(2)}</span>
                                    <button onclick="app.addToCart(event, ${item.id})" class="text-emerald-500 hover:text-emerald-700"><i class="fas fa-plus-circle text-xl"></i></button>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            },

            addToCart(e, id) {
                if(e) e.stopPropagation();
                const existing = this.state.cart.find(i => i.id === id);
                if (existing) existing.qty++;
                else this.state.cart.push({ id, qty: 1 });

                this.saveCart();
                this.showToast("Added to basket");
            },

            clearCart(confirmAction = true) {
                if(confirmAction && !confirm("Clear all items?")) return;
                this.state.cart = [];
                this.saveCart();
            },

            saveCart() {
                localStorage.setItem('cart', JSON.stringify(this.state.cart));
                this.updateCartBadge();
                if(this.state.isCartOpen) this.renderCartItems();
            },

            toggleCartSidebar() { 
                this.state.isCartOpen = true;
                this.renderCartItems(); 
                document.getElementById('cartSidebar').classList.add('active'); 
                document.getElementById('cartOverlay').style.display = 'block'; 
            },

            closeCart() { 
                this.state.isCartOpen = false;
                document.getElementById('cartSidebar').classList.remove('active'); 
                document.getElementById('cartOverlay').style.display = 'none'; 
            },

            renderCartItems() {
                const list = document.getElementById('cartItemsList');
                let total = 0;
                
                list.innerHTML = this.state.cart.map(cartItem => {
                    const item = this.state.catalogData.find(i => i.id === cartItem.id);
                    if(!item) return '';
                    total += (item.price * cartItem.qty);
                    return `
                        <div class="flex items-center gap-4 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl">
                            <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-grow">
                                <h4 class="font-bold text-xs">${item.name}</h4>
                                <p class="text-[10px] text-emerald-600">₹${item.price} x ${cartItem.qty}</p>
                            </div>
                            <button onclick="app.removeFromCart(${item.id})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                        </div>`;
                }).join('') || '<p class="text-center py-10 opacity-50">Empty Cart</p>';

                document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;
            },

            removeFromCart(id) {
                this.state.cart = this.state.cart.filter(i => i.id !== id);
                this.saveCart();
            },

            updateCartBadge() {
                const count = this.state.cart.reduce((acc, curr) => acc + curr.qty, 0);
                const b = document.getElementById('cartBadge');
                b.textContent = count;
                b.classList.toggle('hidden', count === 0);
            },

            toggleTheme() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                const icon = document.getElementById('themeIcon');
                if(icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            },

            filterItems(type) {
                this.state.activeFilter = type;
                this.applyCombinedFilters();
            },

            showToast(msg, isError = false) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.style.background = isError ? '#ef4444' : '#10b981';
                t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 2500);
            },

            openModal(id) {
                const item = this.state.catalogData.find(i => i.id === id);
                document.getElementById('modalContent').innerHTML = `
                    <div class="p-6 text-white">
                        <img src="${item.image}" class="w-full h-48 object-cover rounded-xl mb-4" onerror="this.src='https://via.placeholder.com/300'">
                        <h2 class="text-2xl font-bold">${item.name}</h2>
                        <p class="text-emerald-400 italic mb-4">${item.scientific}</p>
                        <p class="text-sm opacity-80 mb-6">${item.description}</p>
                        <button onclick="app.addToCart(null, ${item.id}); app.closeModal();" class="w-full bg-emerald-500 py-3 rounded-xl font-bold">Add to Cart - ₹${item.price}</button>
                        <button onclick="app.closeModal()" class="w-full mt-2 opacity-50 text-xs">Close</button>
                    </div>`;
                document.getElementById('modal').classList.remove('hidden');
            },

            closeModal() { document.getElementById('modal').classList.add('hidden'); }
        };

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') app.toggleTheme();
            app.init();
        };
    </script>
</body>
</html>
