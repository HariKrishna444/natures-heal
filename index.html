<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #475569;
            --header-bg: #059669; --border-color: #e2e8f0; --input-bg: #ffffff; --footer-bg: #0f172a;
            --hero-bg: #064e3b; --cart-bg: #ffffff;
        }
        .dark {
            --bg-body: #020617; --bg-card: #0f172a; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --header-bg: #064e3b; --border-color: #1e293b; --input-bg: #1e293b; --cart-bg: #0f172a;
        }
        /* Smooth Theme Transition */
        * { transition: background-color 0.3s, color 0.3s; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }
        .hero-banner { background-color: var(--hero-bg); border-radius: 2rem; position: relative; overflow: hidden; }
        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        #cartSidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border-color); }
        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }
        #themeToggle { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px; border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #10b981; color: white; padding: 1rem 2rem; border-radius: 1rem;
            font-weight: 600; box-shadow: 0 10px 15px rgba(0,0,0,0.2); transition: transform 0.3s; z-index: 1000;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="toast">Order Placed Successfully!</div>

    <button id="themeToggle" onclick="app.toggleTheme()" title="Toggle Night Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="app.closeCart()"></div>
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-8 border-b border-emerald-200 dark:border-emerald-800 pb-4">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <div class="flex gap-2">
                    <button onclick="app.clearCart()" class="text-xs text-rose-500 font-bold uppercase tracking-wider">Clear All</button>
                    <button onclick="app.closeCart()" class="text-slate-500"><i class="fas fa-times text-xl"></i></button>
                </div>
            </div>
            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4"></div>
            <div class="mt-6 pt-6 border-t border-emerald-200 dark:border-emerald-800">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-slate-600 dark:text-slate-300">Total Amount:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600 dark:text-emerald-400">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="app.placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-2xl font-bold tracking-tight text-white">Nature's Heal</span>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold">
                <button onclick="app.setFilter('all')" class="filter-btn text-white border-b-2 border-white pb-1">All Catalog</button>
                <button onclick="app.setFilter('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button onclick="app.setFilter('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button onclick="app.setFilter('wild_fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Wild Fruits</button>
                <button onclick="app.setFilter('seed')" class="filter-btn text-emerald-100 hover:text-white pb-1">Seeds</button>
                <button onclick="app.setFilter('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">Collection ⭐</button>
            </nav>
            <div class="relative flex items-center gap-3">
                <button onclick="app.toggleCartSidebar()" class="relative p-2 text-white">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <div class="relative">
                    <input type="text" id="searchInput" oninput="app.handleSearch()" placeholder="Search plants..." class="bg-emerald-700 text-white placeholder-emerald-200 border-none rounded-full py-2 px-4 pl-10 w-full md:w-64 outline-none">
                    <i class="fas fa-search absolute left-3 top-3 text-emerald-200"></i>
                </div>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-4 py-12">
        <section class="hero-banner p-12 mb-16 text-white shadow-xl">
            <div class="max-w-2xl relative z-10">
                <h1 class="text-5xl font-bold mb-6">Discover the Power of Nature</h1>
                <button onclick="document.getElementById('gridContainer').scrollIntoView({behavior: 'smooth'})" class="bg-white text-emerald-900 px-8 py-3 rounded-full font-bold hover:scale-105 transition-transform">Start Exploring</button>
            </div>
        </section>
        <div class="mb-8">
            <h2 class="text-3xl font-bold mb-1 dark:text-white">Botanical Catalog</h2>
            <p class="text-slate-500">Showing <span id="itemCount" class="font-bold text-emerald-600">0</span> unique species</p>
        </div>
        <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-emerald-950 rounded-[2rem] max-w-2xl w-full overflow-hidden border border-emerald-800"></div>
    </div>

    <script type="module">
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;
        const ITEMS_PER_PAGE = 12;

        const app = {
            state: {
                catalogData: [],
                filteredCache: [],
                favorites: JSON.parse(localStorage.getItem('favorites')) || [],
                cart: JSON.parse(localStorage.getItem('cart')) || [],
                currentPage: 1
            },

            async init() {
                this.renderSkeletons();
                await this.fetchSheetData();
                this.updateCartUI();
                if (localStorage.getItem('theme') === 'dark') this.toggleTheme(true);
            },

            renderSkeletons() {
                const container = document.getElementById('gridContainer');
                container.innerHTML = Array(8).fill(0).map(() => `
                    <div class="animate-pulse bg-gray-200 dark:bg-gray-800 rounded-3xl h-80 w-full"></div>
                `).join('');
            },

            async fetchSheetData() {
                try {
                    const response = await fetch(SHEET_URL);
                    const data = await response.text();
                    const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
                    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());

                    this.state.catalogData = rows.slice(1).map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        let obj = {};
                        headers.forEach((h, i) => {
                            let val = cols[i]?.replace(/^"|"$/g, "").trim();
                            if (h === "id" || h === "price") obj[h] = parseFloat(val) || 0;
                            else obj[h] = val || "";
                        });
                        return obj;
                    }).filter(i => i.id);

                    this.applyFilters();
                } catch (e) {
                    this.showToast("Failed to load catalog", true);
                }
            },

            applyFilters() {
                const term = document.getElementById('searchInput').value.toLowerCase();
                const type = localStorage.getItem('selectedFilter') || 'all';
                
                // Fuzzy-ish logic: simple includes but null-safe
                const match = (text) => (text || "").toLowerCase().includes(term);

                this.state.filteredCache = this.state.catalogData.filter(item => {
                    const matchesType = type === 'all' || item.type === type || 
                                       (type === 'favorites' && this.state.favorites.includes(item.id));
                    const matchesSearch = match(item.name) || match(item.scientific) || match(item.uses);
                    return matchesType && matchesSearch;
                });

                this.renderItems(this.state.filteredCache.slice(0, ITEMS_PER_PAGE));
            },

            renderItems(items) {
                const container = document.getElementById('gridContainer');
                container.innerHTML = '';
                document.getElementById('itemCount').textContent = this.state.filteredCache.length;

                items.forEach(item => {
                    const isFav = this.state.favorites.includes(item.id);
                    const isInCart = this.state.cart.some(i => i.id === item.id);
                    const card = document.createElement('div');
                    card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer group relative";
                    card.onclick = () => this.openModal(item);
                    card.innerHTML = `
                        <div class="h-44 overflow-hidden relative">
                            <img src="${item.image}" loading="lazy" width="300" height="200"
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-emerald-700 dark:text-emerald-400">${item.name}</h3>
                                <span class="font-black text-emerald-600">₹${(item.price || 0).toFixed(2)}</span>
                            </div>
                            <p class="text-xs italic text-emerald-600 mb-2">${item.scientific}</p>
                            <button onclick="app.addToCart(event, ${item.id})" 
                                    class="w-full mt-2 py-2 rounded-xl text-xs font-bold uppercase transition-colors ${isInCart ? 'bg-emerald-100 text-emerald-700' : 'bg-emerald-600 text-white'}">
                                ${isInCart ? 'In Cart' : 'Add to Cart'}
                            </button>
                        </div>`;
                    container.appendChild(card);
                });
            },

            addToCart(e, id) {
                if(e) e.stopPropagation();
                const existing = this.state.cart.find(i => i.id === id);
                if (existing) {
                    existing.qty++;
                } else {
                    this.state.cart.push({ id, qty: 1 });
                }
                this.updateCartUI();
                this.showToast("Added to cart");
            },

            clearCart() {
                this.state.cart = [];
                this.updateCartUI();
            },

            updateCartUI() {
                localStorage.setItem('cart', JSON.stringify(this.state.cart));
                const badge = document.getElementById('cartBadge');
                const btn = document.getElementById('placeOrderBtn');
                
                const totalQty = this.state.cart.reduce((sum, i) => sum + i.qty, 0);
                badge.textContent = totalQty;
                badge.classList.toggle('hidden', totalQty === 0);
                btn.disabled = this.state.cart.length === 0;

                this.renderCartItems();
            },

            renderCartItems() {
                const list = document.getElementById('cartItemsList');
                const itemsWithData = this.state.cart.map(cartItem => {
                    const data = this.state.catalogData.find(d => d.id === cartItem.id);
                    return { ...data, ...cartItem };
                }).filter(i => i.name);

                const total = itemsWithData.reduce((sum, i) => sum + (i.price * i.qty), 0);
                document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;

                list.innerHTML = itemsWithData.map(i => `
                    <div class="flex items-center gap-4 p-3 bg-white/60 dark:bg-black/20 rounded-2xl">
                        <img src="${i.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-grow">
                            <h4 class="font-bold text-sm text-emerald-700 dark:text-emerald-400">${i.name}</h4>
                            <p class="text-xs text-slate-500">Qty: ${i.qty} × ₹${i.price}</p>
                        </div>
                    </div>
                `).join('') || '<p class="text-center text-slate-400 py-10">Cart is empty</p>';
            },

            handleSearch() {
                clearTimeout(this.searchTimer);
                this.searchTimer = setTimeout(() => this.applyFilters(), 300);
            },

            setFilter(type) {
                localStorage.setItem('selectedFilter', type);
                this.applyFilters();
            },

            toggleTheme(forced = false) {
                const isDark = forced ? true : !document.body.classList.contains('dark');
                document.body.classList.toggle('dark', isDark);
                document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            },

            showToast(msg, isError = false) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.style.background = isError ? '#ef4444' : '#10b981';
                t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 3000);
            },

            toggleCartSidebar() { document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; },
            closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; },
            openModal(item) { /* Modal logic same as before but using app.addToCart */ },
            closeModal() { document.getElementById('modal').classList.add('hidden'); }
        };

        window.app = app;
        app.init();
    </script>
</body>
</html>
