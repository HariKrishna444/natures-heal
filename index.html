<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
    authDomain: "naturesheal.firebaseapp.com",
    projectId: "naturesheal",
    storageBucket: "naturesheal.firebasestorage.app",
    messagingSenderId: "429407436276",
    appId: "1:429407436276:web:2cb0470eecbf9ed349cda1",
    measurementId: "G-Y6FTZY92QP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.placeOrder = async function() {
    if (cart.length === 0) { alert("Your cart is empty!"); return; }
    const btn = document.getElementById('placeOrderBtn');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;

    const items = catalogData.filter(i => cart.includes(i.id));
    const total = items.reduce((sum, item) => sum + item.price, 0);

    try {
        await addDoc(collection(db, "orders"), {
            order_items: items,
            total_price: total,
            status: "pending",
            created_at: serverTimestamp()
        });
        alert('Order Placed Successfully! Total: ₹' + total.toFixed(2));
        cart = []; 
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartBadge();
        renderCartItems();
        closeCart();
        applyCombinedFilters();
    } catch (error) {
        alert('Failed to place order.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
  }
</script>

            { id: 310, name: "Fenugreek seeds", type: "seed", scientific: "Trigonella foenum-graecum", price: 45.00, uses: "Blood sugar control", description: "Metabolism booster[cite: 1].", image: "https://www.harighotra.co.uk/images/Shutterstock/fenugreekseeds_560x560.webp" },
            { id: 311, name: "Mustard seeds", type: "seed", scientific: "Brassica nigra", price: 30.00, uses: "Anti-inflammatory", description: "Boosts metabolism[cite: 1].", image: "https://images.unsplash.com/photo-1701188542949-210beb8e382c?q=80&w=400" },
            { id: 312, name: "Nigella seeds", type: "seed", scientific: "Nigella sativa", price: 85.00, uses: "Respiratory health", description: "Immunity booster[cite: 1].", image: "https://plus.unsplash.com/premium_photo-1726877060096-882c2ac6d13c?q=80&w=400" },
            { id: 313, name: "Cumin seeds", type: "seed", scientific: "Cuminum cyminum", price: 60.00, uses: "Helps bloating", description: "Digestion aid[cite: 1].", image: "https://plus.unsplash.com/premium_photo-1723874683717-006f24c93975?q=80&w=400" },
            { id: 314, name: "Fennel seeds", type: "seed", scientific: "Foeniculum vulgare", price: 55.00, uses: "Aids digestion", description: "Freshens breath[cite: 1].", image: "https://images.unsplash.com/photo-1701189975806-97b11541ec82?q=80&w=400" },
            { id: 315, name: "Carom seeds", type: "seed", scientific: "Trachyspermum ammi", price: 50.00, uses: "Gut health", description: "Relieves acidity[cite: 1].", image: "https://tajspices.co.uk/cdn/shop/articles/Carom_Seed_500x.jpg?v=1649759522" },
            { id: 316, name: "Garden cress seeds", type: "seed", scientific: "Lepidium sativum", price: 110.00, uses: "Boosts hemoglobin", description: "High in iron[cite: 1].", image: "https://i.cdn.newsbytesapp.com/images/l65020251212132537.jpeg?tr=w-720" }
        ];

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            document.getElementById('itemCount').textContent = items.length;
            
            items.forEach(item => {
                const isFav = favorites.includes(item.id);
                const isCart = cart.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer relative";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="h-32 sm:h-48 overflow-hidden relative">
                        <img src="${item.image}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 flex flex-col gap-1">
                            <button onclick="toggleFav(event, ${item.id})" class="w-7 h-7 flex items-center justify-center rounded-full bg-white/90">
                                <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart text-xs"></i>
                            </button>
                            <button onclick="toggleCartItem(event, ${item.id})" class="w-7 h-7 flex items-center justify-center rounded-full bg-white/90">
                                <i class="fas ${isCart ? 'fa-shopping-cart text-emerald-600' : 'fa-cart-plus text-slate-400'} text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-sm font-bold text-emerald-700 dark:text-emerald-400">${item.name}</h3>
                        <p class="text-[10px] italic text-emerald-600 mb-1">${item.scientific}</p>
                        <p class="text-xs text-slate-500 line-clamp-2">${item.description}</p>
                        <p class="mt-2 text-sm font-black text-emerald-600">₹${item.price.toFixed(2)}</p>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filterItems(type) {
            localStorage.setItem('selectedFilter', type);
            const mobileDrop = document.getElementById('mobileFilter');
            if(mobileDrop) mobileDrop.value = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('border-b-2', btn.dataset.filter === type);
                btn.classList.toggle('text-white', btn.dataset.filter === type);
            });
            applyCombinedFilters();
        }

        function applyCombinedFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = localStorage.getItem('selectedFilter') || 'all';
            const filtered = catalogData.filter(item => {
                const matchesType = type === 'all' || item.type === type || (type === 'favorites' && favorites.includes(item.id));
                const matchesSearch = item.name.toLowerCase().includes(term) || item.scientific.toLowerCase().includes(term);
                return matchesType && matchesSearch;
            });
            renderItems(filtered);
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
                <div class="p-6 text-white max-h-[90vh] overflow-y-auto">
                    <img src="${item.image}" class="w-full h-56 object-cover rounded-xl mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-2xl font-bold">${item.name}</h2>
                        <span class="text-xl font-black">₹${item.price.toFixed(2)}</span>
                    </div>
                    <p class="text-emerald-400 italic mb-4">${item.scientific}</p>
                    <div class="space-y-4">
                        <div><h4 class="text-xs font-bold text-emerald-500 uppercase">Description</h4><p class="text-sm">${item.description}</p></div>
                        <div><h4 class="text-xs font-bold text-emerald-500 uppercase">Benefits</h4><p class="text-sm">${item.uses}</p></div>
                    </div>
                    <button onclick="addToCart(${item.id})" class="w-full bg-emerald-500 py-4 rounded-2xl font-bold mt-6">Add to Cart</button>
                    <button onclick="closeModal()" class="w-full mt-2 text-slate-400 text-sm py-2">Close</button>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function toggleFav(e, id) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(i => i !== id) : [...favorites, id]; localStorage.setItem('favorites', JSON.stringify(favorites)); applyCombinedFilters(); }
        function toggleCartItem(e, id) { if(e) e.stopPropagation(); cart = cart.includes(id) ? cart.filter(i => i !== id) : [...cart, id]; localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); applyCombinedFilters(); }
        function addToCart(id) { if(!cart.includes(id)) cart.push(id); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); closeModal(); toggleCartSidebar(); }
        function toggleCartSidebar() { renderCartItems(); document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; }
        function closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function updateCartBadge() { const b = document.getElementById('cartBadge'); b.textContent = cart.length; b.classList.toggle('hidden', !cart.length); }
        function toggleTheme() { document.body.classList.toggle('dark'); }
        function renderCartItems() {
            const items = catalogData.filter(i => cart.includes(i.id));
            document.getElementById('cartTotal').textContent = `₹${items.reduce((s, i) => s + i.price, 0).toFixed(2)}`;
            document.getElementById('cartItemsList').innerHTML = items.map(i => `
                <div class="flex items-center gap-4 p-3 bg-slate-50 dark:bg-slate-900 rounded-xl">
                    <img src="${i.image}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-grow"><h4 class="font-bold text-xs">${i.name}</h4><p class="text-xs">₹${i.price}</p></div>
                    <button onclick="toggleCartItem(null, ${i.id})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                </div>`).join('') || '<p class="text-center py-10">Cart is empty</p>';
        }

        document.getElementById('searchInput').oninput = applyCombinedFilters;
        window.onload = () => filterItems('all');
    </script>
</body>
</html>
