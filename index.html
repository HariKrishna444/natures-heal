<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --header-bg: #059669; 
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --footer-bg: #0f172a;
            --hero-bg: #064e3b;
            --cart-bg: #ffffff;
        }

        .dark {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --header-bg: #064e3b; 
            --border-color: #1e293b;
            --input-bg: #1e293b;
            --cart-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .hero-banner {
            background-color: var(--hero-bg);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        #cartSidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color);
        }
        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }

        #themeToggle {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px;
            border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
    authDomain: "naturesheal.firebaseapp.com",
    projectId: "naturesheal",
    storageBucket: "naturesheal.firebasestorage.app",
    messagingSenderId: "429407436276",
    appId: "1:429407436276:web:2cb0470eecbf9ed349cda1",
    measurementId: "G-Y6FTZY92QP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.placeOrder = async function() {
    if (cart.length === 0) { alert("Your cart is empty!"); return; }
    const btn = document.getElementById('placeOrderBtn');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;
    const items = catalogData.filter(i => cart.includes(i.id));
    const total = items.reduce((sum, item) => sum + item.price, 0);

    try {
        await addDoc(collection(db, "orders"), {
            order_items: items,
            total_price: total,
            status: "pending",
            created_at: serverTimestamp()
        });
        alert('Order Placed Successfully! Total: ₹' + total.toFixed(2));
        cart = []; 
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartBadge();
        renderCartItems();
        closeCart();
        applyCombinedFilters();
    } catch (error) {
        alert('Failed to place order.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
  }
</script>

    <button id="themeToggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    <div id="cartOverlay" onclick="closeCart()"></div>
    
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <button onclick="closeCart()" class="text-slate-500 hover:text-rose-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4"></div>
            <div class="mt-6 pt-6 border-t">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="font-bold">Total:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Place Order</button>
            </div>
        </div>
    </div>

    <!-- HEADER WITH MOBILE FIX -->
    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-xl sm:text-2xl font-bold text-white">Nature's Heal</span>
            </div>
            
            <!-- Desktop Nav -->
            <nav class="hidden lg:flex space-x-6 font-semibold">
                <button data-filter="all" onclick="filterItems('all')" class="filter-btn text-white border-b-2 border-white pb-1">All</button>
                <button data-filter="leaf" onclick="filterItems('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button data-filter="fruit" onclick="filterItems('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button data-filter="wild_fruit" onclick="filterItems('wild_fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Wild</button>
                <button data-filter="seed" onclick="filterItems('seed')" class="filter-btn text-emerald-100 hover:text-white pb-1">Seeds</button>
                <button data-filter="favorites" onclick="filterItems('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">⭐ Collection</button>
            </nav>

            <div class="flex items-center gap-2">
                <button onclick="toggleCartSidebar()" class="relative p-2 text-white">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-[10px] px-1.5 rounded-full hidden">0</span>
                </button>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search..." class="bg-emerald-700 text-white placeholder-emerald-200 rounded-full py-1.5 px-4 pl-9 w-32 sm:w-48 focus:w-64 transition-all outline-none">
                    <i class="fas fa-search absolute left-3 top-2.5 text-emerald-200 text-xs"></i>
                </div>
            </div>

            <!-- MOBILE DROPDOWN (Visible on Small Screens)[cite: 3] -->
            <div class="w-full lg:hidden mt-2">
                <select id="mobileFilter" onchange="filterItems(this.value)" class="w-full bg-emerald-800 text-white border border-emerald-600 rounded-xl py-2.5 px-4 outline-none font-semibold shadow-inner">
                    <option value="all">🌿 Show All Catalog</option>
                    <option value="leaf">🍃 Leaves & Herbs</option>
                    <option value="fruit">🍎 Fresh Fruits</option>
                    <option value="wild_fruit">🫐 Wild Botanical Fruits</option>
                    <option value="seed">🌰 Nutrient Seeds</option>
                    <option value="favorites">⭐ My Collection</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Hero Section -->
        <section class="hero-banner p-6 md:p-12 mb-12 text-white shadow-xl">
            <div class="max-w-xl relative z-10">
                <h1 class="text-3xl md:text-5xl font-bold mb-4">Discover Healing Power</h1>
                <p class="text-sm md:text-lg mb-8 opacity-90">Explore medicinal uses and nutritional values of the world's most vital botanicals.</p>
                <button onclick="document.getElementById('gridContainer').scrollIntoView({behavior: 'smooth'})" class="bg-white text-emerald-900 px-8 py-3 rounded-full font-bold hover:bg-emerald-50 transition-all">Explore Now</button>
            </div>
        </section>

        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold dark:text-white">Botanical Catalog</h2>
                <p class="text-slate-500 text-sm">Showing <span id="itemCount" class="font-bold text-emerald-600">0</span> items</p>
            </div>
        </div>
        
        <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8"></div>
    </main>

    <!-- Modal and Scripts remain largely same as provided in source[cite: 1, 3] -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-emerald-950 rounded-[2rem] max-w-2xl w-full overflow-hidden shadow-2xl border border-emerald-800"></div>
    </div>

    <script>
        // Data and Logic[cite: 1]
        const catalogData = [
            { id: 1, name: "Aloe Vera", type: "leaf", scientific: "Aloe barbadensis miller", price: 95.00, uses: "Skin healing, Burns treatment", description: "Known for its soothing gel.", image: "https://images.unsplash.com/photo-1672128550038-c21875e68bed?q=80&w=400" },
            { id: 3, name: "Peppermint", type: "leaf", scientific: "Mentha × piperita", price: 60.00, uses: "Digestive aid", description: "High menthol content.", image: "https://images.unsplash.com/photo-1681506346841-82ffe71e8e22?q=80&w=400" },
            { id: 101, name: "Blueberry", type: "fruit", scientific: "Vaccinium corymbosum", price: 180.00, uses: "Brain health", description: "High in antioxidants.", image: "https://images.unsplash.com/photo-1425934398893-310a009a77f9?q=80&w=400" },
            { id: 201, name: "Amla", type: "wild_fruit", scientific: "Phyllanthus emblica", price: 80.00, uses: "Immunity", description: "Extremely high Vit C.", image: "https://images.unsplash.com/photo-1676043967557-2b70d9facd71?q=80&w=400" },
            { id: 301, name: "Chia seeds", type: "seed", scientific: "Salvia hispanica", price: 150.00, uses: "Weight loss", description: "Omega-3 rich.", image: "https://images.unsplash.com/photo-1691443229545-8b17638c8f9c?q=80&w=400" }
            // ... (Other items from original source)
        ];

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            document.getElementById('itemCount').textContent = items.length;
            
            items.forEach(item => {
                const isFav = favorites.includes(item.id);
                const isCart = cart.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer relative";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="h-32 sm:h-48 overflow-hidden relative">
                        <img src="${item.image}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 flex flex-col gap-1">
                            <button onclick="toggleFav(event, ${item.id})" class="w-7 h-7 flex items-center justify-center rounded-full bg-white/90">
                                <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="text-sm sm:text-base font-bold text-emerald-700">${item.name}</h3>
                        <p class="text-[10px] sm:text-xs text-slate-500">₹${item.price.toFixed(2)}</p>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filterItems(type) {
            localStorage.setItem('selectedFilter', type);
            // Sync mobile dropdown
            const mobileDrop = document.getElementById('mobileFilter');
            if(mobileDrop) mobileDrop.value = type;
            
            // Sync Desktop Nav
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('border-b-2', btn.dataset.filter === type);
                btn.classList.toggle('text-white', btn.dataset.filter === type);
            });
            applyCombinedFilters();
        }

        function applyCombinedFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = localStorage.getItem('selectedFilter') || 'all';
            const filtered = catalogData.filter(item => {
                const matchesType = type === 'all' || item.type === type || (type === 'favorites' && favorites.includes(item.id));
                const matchesSearch = item.name.toLowerCase().includes(term);
                return matchesType && matchesSearch;
            });
            renderItems(filtered);
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
                <div class="p-6 text-white">
                    <img src="${item.image}" class="w-full h-48 object-cover rounded-xl mb-4">
                    <h2 class="text-2xl font-bold">${item.name}</h2>
                    <p class="italic mb-4">${item.scientific}</p>
                    <p class="text-sm mb-6">${item.description}</p>
                    <button onclick="addToCart(${item.id})" class="w-full bg-emerald-500 py-3 rounded-xl font-bold">Add to Cart - ₹${item.price}</button>
                    <button onclick="closeModal()" class="w-full mt-2 text-slate-400 text-sm">Close</button>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function toggleFav(e, id) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(i => i !== id) : [...favorites, id]; localStorage.setItem('favorites', JSON.stringify(favorites)); applyCombinedFilters(); }
        function addToCart(id) { if(!cart.includes(id)) cart.push(id); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); closeModal(); toggleCartSidebar(); }
        function toggleCartSidebar() { renderCartItems(); document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; }
        function closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function updateCartBadge() { const b = document.getElementById('cartBadge'); b.textContent = cart.length; b.classList.toggle('hidden', !cart.length); }
        function toggleTheme() { document.body.classList.toggle('dark'); }
        function renderCartItems() {
            const items = catalogData.filter(i => cart.includes(i.id));
            document.getElementById('cartTotal').textContent = `₹${items.reduce((s, i) => s + i.price, 0).toFixed(2)}`;
            document.getElementById('cartItemsList').innerHTML = items.map(i => `<div class="p-2 border-b text-sm">${i.name} - ₹${i.price}</div>`).join('') || 'Empty';
        }

        document.getElementById('searchInput').oninput = applyCombinedFilters;
        window.onload = () => filterItems('all');
    </script>
</body>
</html>
