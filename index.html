<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --header-bg: #059669; 
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --footer-bg: #0f172a;
            --hero-bg: #064e3b;
            --cart-bg: #ffffff;
        }

        .dark {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --header-bg: #064e3b; 
            --border-color: #1e293b;
            --input-bg: #1e293b;
            --cart-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        .hero-banner {
            background-color: var(--hero-bg);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        #cartSidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color);
        }

        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }
        
        footer { background-color: var(--footer-bg); color: white; }

        #themeToggle {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px;
            border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .modal-animate { animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
  authDomain: "naturesheal.firebaseapp.com",
  projectId: "naturesheal",
  storageBucket: "naturesheal.firebasestorage.app",
  messagingSenderId: "429407436276",
  appId: "1:429407436276:web:2cb0470eecbf9ed349cda1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;

window.catalogData = [];
window.favorites = JSON.parse(localStorage.getItem('favorites')) || [];
window.cart = JSON.parse(localStorage.getItem('cart')) || [];

window.fetchSheetData = async function () {
    try {
        const res = await fetch(SHEET_URL);
        const csv = await res.text();
        const rows = csv.split("\n").filter(r => r.trim() !== "");
        const headers = rows[0].split(",").map(h => h.trim().toLowerCase());

        window.catalogData = rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let obj = {};
            headers.forEach((h, i) => {
                let val = cols[i]?.replace(/"/g, "").trim();
                if (h === "id" || h === "price") obj[h] = parseFloat(val) || 0;
                else obj[h] = val || "";
            });
            return obj;
        }).filter(i => i.id);

        filterItems('all');
        updateCartBadge();
    } catch (err) {
        console.error(err);
    }
};

window.placeOrder = async function () {
    if (cart.length === 0) return alert("Your cart is empty!");

    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const email = document.getElementById('custEmail').value;
    const address = document.getElementById('custAddress').value;

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!name || !phone || !address || !emailRegex.test(email)) {
        return alert("Please provide valid Name, Phone, Email, and Address.");
    }

    const btn = document.getElementById("placeOrderBtn");
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

    const items = window.catalogData.filter(i => cart.includes(i.id));
    const total = items.reduce((s, i) => s + i.price, 0);

    try {
        await addDoc(collection(db, "orders"), {
            customer: { name, phone, email, address },
            items,
            total,
            status: "pending",
            created_at: serverTimestamp()
        });

        alert("Order successful! Thank you for choosing Nature's Heal.");
        window.cart = [];
        localStorage.setItem("cart", "[]");
        updateCartBadge();
        renderCartItems();
        closeCart();
    } catch (e) {
        alert("Error saving order. Please try again.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Place Order";
    }
};

window.onload = fetchSheetData;
</script>

    <button id="themeToggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="closeCart()"></div>
    
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-emerald-600">Your Cart</h2>
                <button onclick="closeCart()"><i class="fas fa-times text-xl"></i></button>
            </div>

            <!-- Customer Form -->
            <div class="space-y-3 mb-6 bg-emerald-50 dark:bg-slate-800 p-4 rounded-xl">
                <input type="text" id="custName" placeholder="Full Name" class="w-full p-2 rounded border border-emerald-200 dark:bg-slate-700 dark:text-white">
                <input type="tel" id="custPhone" placeholder="Phone Number" class="w-full p-2 rounded border border-emerald-200 dark:bg-slate-700 dark:text-white">
                <input type="email" id="custEmail" placeholder="Email Address" class="w-full p-2 rounded border border-emerald-200 dark:bg-slate-700 dark:text-white">
                <textarea id="custAddress" placeholder="Full Delivery Address" class="w-full p-2 rounded border border-emerald-200 dark:bg-slate-700 dark:text-white"></textarea>
            </div>

            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4"></div>
            
            <div class="mt-6 pt-4 border-t border-emerald-200">
                <div class="flex justify-between font-bold text-xl mb-4">
                    <span>Total:</span>
                    <span id="cartTotal">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40 text-white">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-leaf text-2xl"></i>
                <span class="text-2xl font-bold">Nature's Heal</span>
            </div>
            <nav class="hidden md:flex space-x-6 font-semibold">
                <button onclick="filterItems('all')" class="hover:opacity-80">All</button>
                <button onclick="filterItems('leaf')" class="hover:opacity-80">Leaves</button>
                <button onclick="filterItems('fruit')" class="hover:opacity-80">Fruits</button>
                <button onclick="filterItems('favorites')" class="hover:opacity-80">Favorites ⭐</button>
            </nav>
            <button onclick="toggleCartSidebar()" class="relative p-2">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cartBadge" class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] px-1.5 rounded-full hidden">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <section class="hero-banner p-8 md:p-16 mb-12 text-white shadow-xl">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">Botanical Wonders</h1>
            <p class="text-lg opacity-90">Explore the healing properties of nature's finest leaves and fruits.</p>
        </section>

        <div id="gridContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <footer class="py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 Nature's Heal Encyclopedia. Bringing botanical wisdom to your fingertips.</p>
            <div class="flex justify-center space-x-6 mt-4">
                <i class="fab fa-instagram text-xl cursor-pointer hover:text-emerald-400"></i>
                <i class="fab fa-facebook text-xl cursor-pointer hover:text-emerald-400"></i>
                <i class="fab fa-twitter text-xl cursor-pointer hover:text-emerald-400"></i>
            </div>
        </div>
    </footer>

    <!-- Details Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-white dark:bg-slate-900 rounded-3xl max-w-2xl w-full overflow-hidden shadow-2xl modal-animate">
            <!-- Dynamic Content Injected Here -->
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            items.forEach(item => {
                const isFav = favorites.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer group";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <img src="${item.image}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg dark:text-emerald-400">${item.name}</h3>
                            <span class="font-bold text-emerald-600">₹${item.price}</span>
                        </div>
                        <p class="text-sm text-slate-500 italic mb-2">${item.scientific || ''}</p>
                        <p class="text-xs text-slate-400 line-clamp-2">${item.description}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
                <div class="relative">
                    <img src="${item.image}" class="w-full h-64 object-cover">
                    <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full hover:bg-black/70">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="p-8">
                    <h2 class="text-3xl font-bold text-emerald-600 mb-2">${item.name}</h2>
                    <p class="text-emerald-500 italic mb-6">${item.scientific || 'Botanical Species'}</p>
                    
                    <div class="grid md:grid-cols-2 gap-8 mb-8">
                        <div>
                            <h4 class="font-bold text-slate-700 dark:text-slate-200 mb-2 uppercase text-xs tracking-widest">Description</h4>
                            <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">${item.description}</p>
                        </div>
                        <div>
                            <h4 class="font-bold text-emerald-700 dark:text-emerald-300 mb-2 uppercase text-xs tracking-widest">Healing Benefits</h4>
                            <p class="text-emerald-600/80 dark:text-emerald-400/80 text-sm leading-relaxed">${item.benefits || 'High in antioxidants and essential nutrients for daily wellness.'}</p>
                        </div>
                    </div>
                    
                    <button onclick="addToCart(${item.id})" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700">
                        Add to Cart - ₹${item.price}
                    </button>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function filterItems(type) {
            const filtered = type === 'all' ? window.catalogData : 
                           type === 'favorites' ? window.catalogData.filter(i => favorites.includes(i.id)) :
                           window.catalogData.filter(i => i.type === type);
            renderItems(filtered);
        }

        function toggleCartSidebar() {
            renderCartItems();
            document.getElementById('cartSidebar').classList.add('active');
            document.getElementById('cartOverlay').style.display = 'block';
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('active');
            document.getElementById('cartOverlay').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            if(!cart.includes(id)) cart.push(id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            closeModal();
            toggleCartSidebar();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            badge.textContent = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
        }

        function renderCartItems() {
            const list = document.getElementById('cartItemsList');
            const items = window.catalogData.filter(i => cart.includes(i.id));
            const total = items.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;
            list.innerHTML = items.length ? items.map(i => `
                <div class="flex items-center gap-4 bg-emerald-50 dark:bg-slate-800 p-3 rounded-2xl">
                    <img src="${i.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm dark:text-emerald-300">${i.name}</h4>
                        <span class="text-emerald-600 text-xs">₹${i.price}</span>
                    </div>
                    <button onclick="removeItem(${i.id})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                </div>`).join('') : '<p class="text-center py-10 opacity-50">Your cart is lonely...</p>';
        }

        function removeItem(id) {
            cart = cart.filter(i => i !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            renderCartItems();
        }
    </script>
</body>
</html>
