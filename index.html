<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Heal: Leaves & Fruits Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --header-bg: #059669; 
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --footer-bg: #0f172a;
            --hero-bg: #064e3b;
            --cart-bg: #ffffff;
        }

        .dark {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --header-bg: #064e3b; 
            --border-color: #1e293b;
            --input-bg: #1e293b;
            --cart-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .hero-banner {
            background-color: var(--hero-bg);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border-color); }
        header { background-color: var(--header-bg) !important; border-bottom: 1px solid var(--border-color); }
        
        .nature-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        #cartSidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: var(--cart-bg); z-index: 100; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 1px solid var(--border-color);
        }

        #cartSidebar.active { right: 0; }
        #cartOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; display: none; }
        footer { background-color: var(--footer-bg); }

        #themeToggle {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 50px; height: 50px;
            border-radius: 50%; background: #10b981; color: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .modal-animate { animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5qUEW8YRcGU6zwmmr271lLeBHcu0Vjh4",
  authDomain: "naturesheal.firebaseapp.com",
  projectId: "naturesheal",
  storageBucket: "naturesheal.firebasestorage.app",
  messagingSenderId: "429407436276",
  appId: "1:429407436276:web:2cb0470eecbf9ed349cda1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR4opRHwgnv-oDJG-YtvMsbQuQP7Xea38B2ovpgWMJA6s4GYiJ0R3RLVCJhljuwwTc0MJWzJCRWv2EF/pub?output=csv`;

window.catalogData = [];
window.favorites = JSON.parse(localStorage.getItem('favorites')) || [];
window.cart = JSON.parse(localStorage.getItem('cart')) || [];

window.fetchSheetData = async function () {
    try {
        const res = await fetch(SHEET_URL);
        const csv = await res.text();
        const rows = csv.split("\n").filter(r => r.trim() !== "");
        const headers = rows[0].split(",").map(h => h.trim().toLowerCase());

        window.catalogData = rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let obj = {};
            headers.forEach((h, i) => {
                let val = cols[i]?.replace(/"/g, "").trim();
                if (h === "id" || h === "price") obj[h] = parseFloat(val) || 0;
                else obj[h] = val || "";
            });
            return obj;
        }).filter(i => i.id);

        filterItems('all'); 
        updateCartBadge();
    } catch (err) {
        console.error(err);
        document.getElementById("gridContainer").innerHTML = `<p class="text-center text-red-500">Failed to load data</p>`;
    }
};

window.placeOrder = async function () {
    if (cart.length === 0) return alert("Your cart is empty!");

    const name = document.getElementById('userName').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const address = document.getElementById('userAddress').value.trim();

    // Strict Email Validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    if (!name || !phone || !email || !address) {
        return alert("Please fill in all delivery details.");
    }
    if (!emailRegex.test(email)) {
        return alert("Please enter a valid and authentic Email ID.");
    }

    const btn = document.getElementById("placeOrderBtn");
    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;

    const items = window.catalogData.filter(i => cart.includes(i.id));
    const total = items.reduce((s, i) => s + i.price, 0);

    try {
        await addDoc(collection(db, "orders"), {
            customer: { name, phone, email, address },
            order_items: items,
            total_price: total,
            status: "pending",
            created_at: serverTimestamp()
        });

        alert(`Order Placed Successfully! \nA confirmation has been sent to ${email}. \nTotal: ₹${total.toFixed(2)}`);
        
        // Dynamic success visual effect (temporary)
        document.querySelector('header').style.backgroundColor = '#10b981';
        
        window.cart = [];
        localStorage.setItem("cart", JSON.stringify(window.cart));

        updateCartBadge();
        renderCartItems();
        closeCart();
        applyCombinedFilters();
    } catch (e) {
        console.error('Firestore Error:', e);
        alert("Error placing order.");
    }

    btn.disabled = false;
    btn.innerHTML = originalText;
};

window.onload = () => {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeIcon').className = 'fas fa-sun';
    }
    fetchSheetData();
};
</script>

    <button id="themeToggle" onclick="toggleTheme()" title="Toggle Night Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div id="cartOverlay" onclick="closeCart()"></div>
    
    <div id="cartSidebar">
        <div class="flex flex-col h-full p-6">
            <div class="flex justify-between items-center mb-6 border-b border-emerald-200 dark:border-emerald-800 pb-4">
                <h2 class="text-2xl font-bold text-emerald-600">Shopping Cart</h2>
                <button onclick="closeCart()" class="text-slate-500 dark:text-slate-400 hover:text-rose-500 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- Customer Details Form -->
            <div class="space-y-3 mb-6">
                <input type="text" id="userName" placeholder="Full Name" class="w-full p-2 text-sm border rounded-lg bg-emerald-50 dark:bg-slate-800 border-emerald-200 dark:border-emerald-700 outline-none">
                <input type="text" id="userPhone" placeholder="Phone Number" class="w-full p-2 text-sm border rounded-lg bg-emerald-50 dark:bg-slate-800 border-emerald-200 dark:border-emerald-700 outline-none">
                <input type="email" id="userEmail" placeholder="Email ID" class="w-full p-2 text-sm border rounded-lg bg-emerald-50 dark:bg-slate-800 border-emerald-200 dark:border-emerald-700 outline-none">
                <textarea id="userAddress" placeholder="Delivery Address" class="w-full p-2 text-sm border rounded-lg bg-emerald-50 dark:bg-slate-800 border-emerald-200 dark:border-emerald-700 outline-none h-16"></textarea>
            </div>

            <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
            
            <div class="mt-6 pt-6 border-t border-emerald-200 dark:border-emerald-800">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="font-bold text-slate-600 dark:text-slate-300">Total Amount:</span>
                    <span id="cartTotal" class="text-2xl font-black text-emerald-600 dark:text-emerald-400">₹0.00</span>
                </div>
                <button id="placeOrderBtn" onclick="placeOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all flex justify-center items-center gap-2">
                    <span>Place Order</span>
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-leaf text-emerald-600 text-xl"></i></div>
                <span class="text-2xl font-bold tracking-tight text-white">Nature's Heal</span>
            </div>
            
            <nav class="hidden md:flex space-x-8 font-semibold">
                <button data-filter="all" onclick="filterItems('all')" class="filter-btn text-white border-b-2 border-white pb-1">All Catalog</button>
                <button data-filter="leaf" onclick="filterItems('leaf')" class="filter-btn text-emerald-100 hover:text-white pb-1">Leaves</button>
                <button data-filter="fruit" onclick="filterItems('fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Fruits</button>
                <button data-filter="wild_fruit" onclick="filterItems('wild_fruit')" class="filter-btn text-emerald-100 hover:text-white pb-1">Wild Fruits</button>
                <button data-filter="seed" onclick="filterItems('seed')" class="filter-btn text-emerald-100 hover:text-white pb-1">Seeds</button>
                <button data-filter="favorites" onclick="filterItems('favorites')" class="filter-btn text-emerald-100 hover:text-white pb-1">Collection ⭐</button>
            </nav>

            <div class="relative flex items-center gap-3">
                <button onclick="toggleCartSidebar()" class="relative p-2 text-white hover:text-emerald-200">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search plants..." class="bg-emerald-700 text-white placeholder-emerald-200 border-none rounded-full py-2 px-4 pl-10 focus:ring-2 focus:ring-white w-full md:w-64 transition-all">
                    <i class="fas fa-search absolute left-3 top-3 text-emerald-200"></i>
                </div>
            </div>

            <div class="w-full md:hidden mt-2">
                <select id="mobileFilter" onchange="filterItems(this.value)" class="w-full bg-emerald-800 text-white border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-white transition-all outline-none font-semibold">
                    <option value="all">🌿 All Catalog</option>
                    <option value="leaf">🍃 Leaves</option>
                    <option value="fruit">🍎 Fruits</option>
                    <option value="wild_fruit">🫐 Wild Fruits</option>
                    <option value="seed">🌰 Seeds</option>
                    <option value="favorites">⭐ Collection</option>
                </select>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <section class="hero-banner p-4 sm:p-6 md:p-12 mb-8 md:mb-16 text-white shadow-xl">
            <div class="max-w-xl md:max-w-2xl relative z-10">
                <h1 class="text-2xl sm:text-3xl md:text-5xl font-bold mb-3 sm:mb-4 md:mb-6 leading-tight">Discover the Power of Nature's Elements</h1>
                <p class="text-sm sm:text-base md:text-lg mb-5 sm:mb-6 md:mb-10 opacity-90 text-emerald-50">Explore botanical treasures pulled straight from our live database.</p>
                <button onclick="document.getElementById('gridContainer').scrollIntoView({behavior: 'smooth'})"
                    class="bg-white text-emerald-900 px-5 sm:px-6 md:px-8 py-2 sm:py-2.5 md:py-3 rounded-full font-bold text-xs sm:text-sm md:text-base hover:bg-emerald-50 transition-all transform hover:scale-105">Start Exploring</button>
            </div>
        </section>

        <div class="mb-8">
            <h2 class="text-3xl font-bold mb-1 dark:text-white">Botanical Catalog</h2>
            <p class="text-muted font-medium">Showing <span id="itemCount" class="font-bold text-emerald-600">0</span> items</p>
        </div>
        
        <div id="gridContainer" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-4 md:gap-8"></div>
    </main>

    <footer class="py-12 mt-20 border-t border-emerald-900/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center space-x-2">
                    <div class="bg-emerald-600 p-2 rounded-lg"><i class="fas fa-leaf text-white text-xl"></i></div>
                    <span class="text-xl font-bold dark:text-white">Nature's Heal</span>
                </div>
                <div class="text-slate-500 dark:text-slate-400 text-sm">
                    © 2026 Nature's Heal Encyclopedia. All botanical data sourced responsibly.
                </div>
                <div class="flex space-x-6 text-emerald-600">
                    <a href="#" class="hover:text-emerald-500"><i class="fab fa-instagram text-xl"></i></a>
                    <a href="#" class="hover:text-emerald-500"><i class="fab fa-facebook text-xl"></i></a>
                    <a href="#" class="hover:text-emerald-500"><i class="fab fa-twitter text-xl"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div id="modalContent" class="bg-emerald-950 rounded-[2rem] max-w-2xl w-full overflow-hidden shadow-2xl modal-animate border border-emerald-800"></div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function renderItems(items) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            document.getElementById('itemCount').textContent = items.length;
            
            items.forEach(item => {
                const isFav = favorites.includes(item.id);
                const isCart = cart.includes(item.id);
                const card = document.createElement('div');
                card.className = "nature-card card-gradient rounded-3xl overflow-hidden cursor-pointer group relative";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="h-28 sm:h-36 md:h-56 overflow-hidden relative">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-1 right-1 sm:top-3 sm:right-3 flex flex-col gap-1">
                            <button onclick="toggleFav(event, ${item.id})" class="w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center rounded-full bg-white/90">
                                <i class="${isFav ? 'fas text-rose-500' : 'far text-slate-400'} fa-heart text-[10px]"></i>
                            </button>
                            <button onclick="toggleCartItem(event, ${item.id})" class="w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center rounded-full bg-white/90">
                                <i class="fas ${isCart ? 'fa-shopping-cart text-emerald-600' : 'fa-cart-plus text-slate-400'} text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-3 sm:p-4">
                        <div class="flex justify-between items-start mb-1 gap-2">
                            <h3 class="text-xs sm:text-base font-bold text-emerald-700 dark:text-emerald-400 leading-tight">${item.name}</h3>
                            <span class="text-xs sm:text-sm font-black text-emerald-600 whitespace-nowrap">₹${item.price}</span>
                        </div>
                        <p class="text-[9px] italic text-emerald-600 mb-2">${item.scientific || ''}</p>
                        <p class="text-[10px] sm:text-xs text-slate-500 leading-relaxed">${item.description?.substring(0, 60)}...</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(item) {
            document.getElementById('modalContent').innerHTML = `
            <div class="relative max-h-[90vh] overflow-y-auto">
                <img src="${item.image}" class="w-full h-44 sm:h-72 object-cover">
                <button onclick="closeModal()" class="absolute top-3 right-3 bg-black/60 text-white w-9 h-9 rounded-full"><i class="fas fa-times"></i></button>
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-emerald-400 mb-2">${item.name}</h2>
                    <p class="text-sm italic text-emerald-300 mb-4">${item.scientific || ''}</p>
                    <p class="text-white text-sm leading-relaxed mb-6">${item.description}</p>
                    <button onclick="addToCart(${item.id})" class="w-full bg-[#10b981] text-white py-3 rounded-xl font-bold">Add to Cart - ₹${item.price}</button>
                </div>
            </div>`;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function applyCombinedFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = localStorage.getItem('selectedFilter') || 'all';
            const filtered = window.catalogData.filter(item => {
                const matchesType = type === 'all' || item.type === type || (type === 'favorites' && favorites.includes(item.id));
                const matchesSearch = item.name.toLowerCase().includes(term);
                return matchesType && matchesSearch;
            });
            renderItems(filtered);
        }

        function filterItems(type) {
            localStorage.setItem('selectedFilter', type);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('text-white', btn.dataset.filter === type);
                btn.classList.toggle('border-b-2', btn.dataset.filter === type);
            });
            const mobileDropdown = document.getElementById('mobileFilter');
            if(mobileDropdown) mobileDropdown.value = type;
            applyCombinedFilters();
        }

        function toggleFav(e, id) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(i => i !== id) : [...favorites, id]; localStorage.setItem('favorites', JSON.stringify(favorites)); applyCombinedFilters(); }
        function toggleCartItem(e, id) { if(e) e.stopPropagation(); cart = cart.includes(id) ? cart.filter(i => i !== id) : [...cart, id]; localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); renderCartItems(); applyCombinedFilters(); }
        function addToCart(id) { if(!cart.includes(id)) cart.push(id); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); closeModal(); toggleCartSidebar(); }
        function updateCartBadge() { const b = document.getElementById('cartBadge'); b.textContent = cart.length; b.classList.toggle('hidden', !cart.length); }
        function toggleCartSidebar() { renderCartItems(); document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').style.display = 'block'; }
        function closeCart() { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').style.display = 'none'; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        document.getElementById('searchInput').oninput = applyCombinedFilters;

        function renderCartItems() {
            const list = document.getElementById('cartItemsList');
            const items = window.catalogData.filter(i => cart.includes(i.id));
            const total = items.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').textContent = `₹${total.toFixed(2)}`;
            list.innerHTML = items.length ? items.map(i => `
                <div class="flex items-center gap-4 p-3 bg-white/60 dark:bg-black/20 rounded-2xl border">
                    <img src="${i.image}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm text-emerald-700 dark:text-emerald-400">${i.name}</h4>
                        <span class="text-xs font-black text-emerald-600">₹${i.price}</span>
                    </div>
                    <button onclick="toggleCartItem(null, ${i.id})" class="text-rose-500"><i class="fas fa-trash-can"></i></button>
                </div>`).join('') : '<p class="text-center py-10">Cart is empty</p>';
        }
    </script>
</body>
</html>
